<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A35CF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7D6BF2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEAECA;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="15"/>
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#accent)" text-anchor="middle" letter-spacing="3">👑 ROYAL BLUEPRINT</text>
  <text x="400" y="120" font-family="Arial, sans-serif" font-size="18" fill="#a0a0c0" text-anchor="middle" letter-spacing="1">Blueprint Framework — Royal Panel Edition</text>
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="14" fill="#606080" text-anchor="middle">Maintained by Shaurya Vashishtha (Royal Devlopments)</text>
  <line x1="100" y1="165" x2="700" y2="165" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
</svg>
